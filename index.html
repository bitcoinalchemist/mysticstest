<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tools</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="site.css" />
<style>
  body { min-height: 100vh; }
  .page { display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 64px); }
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1.5rem;
    padding: 2rem;
    width: 100%;
    max-width: 640px;
  }
  .card {
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3rem 2rem;
    text-decoration: none;
    color: var(--text);
    box-shadow: var(--sh-sm);
    font-family: var(--serif);
    font-size: clamp(1.4rem, 3vw, 1.9rem);
    font-weight: 400;
    letter-spacing: .01em;
    transition: transform var(--ease), box-shadow var(--ease), border-color var(--ease);
  }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: var(--sh-lg);
    border-color: var(--border-strong);
  }
  @media (max-width: 480px) {
    .grid { grid-template-columns: 1fr; gap: 1rem; }
    .card { padding: 2.5rem 1.5rem; }
  }
</style>
</head>
<body>
  <header class="site-header">
    <div class="sh-inner">
      <a href="index.html" class="sh-logo">mysticscards<span class="suit">.space</span></a>
      <button class="burger" id="burgerBtn" aria-label="Menu"><span></span><span></span><span></span></button>
      <nav class="sh-nav" id="shNav">
        <a href="quadration.html">Playing Cards</a>
        <a href="calculator.html">Calculator</a>
        <a href="iching.html">I Ching</a>
        <a href="bip39.html">BIP39</a>
      </nav>
    </div>
  </header>
  <div class="page">
  <main class="grid">
    <a class="card" href="quadration.html">Playing Cards</a>
    <a class="card" href="calculator.html">Calculator</a>
    <a class="card" href="iching.html">I Ching</a>
    <a class="card" href="bip39.html">BIP39</a>
  </main>
  </div>
<script>
(function(){
  var btn=document.getElementById('burgerBtn'),nav=document.getElementById('shNav');
  btn.addEventListener('click',function(e){e.stopPropagation();nav.classList.toggle('open');});
  document.addEventListener('click',function(){nav.classList.remove('open');});
})();
</script>
<footer class="site-footer"><div class="sf-inner"></div></footer>
</body>
</html>
