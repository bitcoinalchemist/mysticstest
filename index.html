<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tools</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#1e2340" />
<link rel="stylesheet" href="site.css" />
<style>
  body { min-height: 100vh; }
  .page {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 64px);
  }
  .hub {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.25rem;
    padding: 2rem;
    width: 100%;
    max-width: 680px;
  }

  /* ── Main cards ── */
  .main-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.25rem;
    width: 100%;
  }
  .card {
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3.5rem 2rem;
    text-decoration: none;
    color: var(--text);
    box-shadow: var(--sh-sm);
    font-family: var(--serif);
    font-size: clamp(1.4rem, 3vw, 1.9rem);
    font-weight: 400;
    letter-spacing: .01em;
    transition: transform var(--ease), box-shadow var(--ease), border-color var(--ease);
  }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: var(--sh-lg);
    border-color: var(--border-strong);
  }

  /* ── Tools row ── */
  .tools-row {
    display: flex;
    flex-wrap: wrap;
    gap: .75rem;
    justify-content: center;
    width: 100%;
  }
  .tool-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: .6rem 1.6rem;
    text-decoration: none;
    color: var(--text);
    font-family: var(--sans);
    font-size: .9rem;
    font-weight: 500;
    letter-spacing: .03em;
    transition: background var(--ease), border-color var(--ease), box-shadow var(--ease);
  }
  .tool-btn:hover {
    background: var(--surface);
    border-color: var(--border-strong);
    box-shadow: var(--sh-sm);
  }

  @media (max-width: 480px) {
    .main-row { grid-template-columns: 1fr; }
    .card { padding: 2.5rem 1.5rem; }
  }
</style>
</head>
<body>
<script src="site.js"></script>
<div class="page">
  <main class="hub">
    <div class="main-row">
      <a class="card" href="cardsoflife.html">Cards of Life</a>
      <a class="card" href="iching.html">I Ching</a>
    </div>
    <div class="tools-row">
      <a class="tool-btn" href="calculator.html">Calculator</a>
      <a class="tool-btn" href="hexagrams.html">Hexagrams</a>
      <a class="tool-btn" href="quadrations.html">Quadrations</a>
    </div>
  </main>
</div>
<footer class="site-footer"><div class="sf-inner"></div></footer>
</body>
</html>
