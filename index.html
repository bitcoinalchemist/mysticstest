<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Mystic's Tools</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#1e2340" />
<link rel="stylesheet" href="css/site.css" />
<style>
  /* ── Celestial hero band (full-bleed, body level) ── */
  .hero {
    position: relative;
    background: radial-gradient(120% 140% at 50% -20%, #323965 0%, #252a4a 55%, #1e2240 100%);
    padding: 3.5rem 0 7rem;
    overflow: hidden;
  }

  /* ── Hub below, cards overlapping the band edge ── */
  .hub {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
    width: 100%;
    max-width: 880px;
    margin: -4.5rem auto 0;
    padding: 0 2rem 3.5rem;
    position: relative;
  }
  .main-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.25rem;
    width: 100%;
  }
  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: .35rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.2rem 1.4rem 1.9rem;
    text-decoration: none;
    color: var(--text);
    box-shadow: var(--sh-md);
    transition: transform var(--ease), box-shadow var(--ease), border-color var(--ease);
  }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: var(--sh-lg);
    border-color: var(--gold);
  }
  .card svg.emblem {
    width: 78px;
    height: 78px;
    margin-bottom: .55rem;
  }
  .card .card-title {
    font-family: var(--serif);
    font-size: clamp(1.25rem, 2.6vw, 1.55rem);
    font-weight: 500;
    letter-spacing: .01em;
  }
  .card .card-sub {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 300;
    font-size: .95rem;
    color: rgba(26,25,22,.55);
  }

  /* ── Tools row ── */
  .tools-row {
    display: flex;
    flex-wrap: wrap;
    gap: .75rem;
    justify-content: center;
    width: 100%;
    margin-top: .25rem;
  }
  .tool-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: .6rem 1.6rem;
    text-decoration: none;
    color: var(--text);
    font-family: var(--sans);
    font-size: .9rem;
    font-weight: 500;
    letter-spacing: .03em;
    transition: background var(--ease), border-color var(--ease), box-shadow var(--ease);
  }
  .tool-btn:hover {
    background: var(--surface);
    border-color: var(--rule-strong);
    box-shadow: var(--sh-sm);
  }

  @media (max-width: 720px) {
    .main-row { grid-template-columns: 1fr; }
    .hero { padding: 3.2rem 0 6rem; }
  }
</style>
</head>
<body>
<script src="js/site.js"></script>

<section class="hero" aria-hidden="true"></section>

<main class="hub">
  <div class="main-row">
    <a class="card" href="cardsoflife.html">
      <svg class="emblem" viewBox="0 0 84 84" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <g fill="none" stroke="var(--gold)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <rect x="18" y="16" width="34" height="48" rx="5" transform="rotate(-9 35 40)" opacity=".55"/>
          <rect x="32" y="20" width="34" height="48" rx="5" transform="rotate(7 49 44)" fill="var(--surface)"/>
        </g>
        <path d="M52 36 Q53.6 41.4 59 43 Q53.6 44.6 52 50 Q50.4 44.6 45 43 Q50.4 41.4 52 36 Z" fill="var(--gold)" transform="rotate(7 49 44)"/>
      </svg>
      <span class="card-title">Cards of Life</span>
      <span class="card-sub">Birth cards and the year&rsquo;s spread</span>
    </a>
    <a class="card" href="iching.html">
      <svg class="emblem" viewBox="0 0 84 84" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <g stroke="var(--gold)" stroke-width="4.5" stroke-linecap="round">
          <line x1="22" y1="20" x2="62" y2="20"/>
          <line x1="22" y1="29" x2="38" y2="29"/><line x1="46" y1="29" x2="62" y2="29"/>
          <line x1="22" y1="38" x2="62" y2="38"/>
          <line x1="22" y1="47" x2="38" y2="47"/><line x1="46" y1="47" x2="62" y2="47"/>
          <line x1="22" y1="56" x2="62" y2="56"/>
          <line x1="22" y1="65" x2="38" y2="65"/><line x1="46" y1="65" x2="62" y2="65"/>
        </g>
      </svg>
      <span class="card-title">I Ching</span>
      <span class="card-sub">Cast hexagrams, read the lines</span>
    </a>
    <a class="card" href="astrology.html">
      <svg class="emblem" viewBox="0 0 84 84" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <g fill="none" stroke="var(--gold)">
          <circle cx="42" cy="42" r="30" stroke-width="2.5"/>
          <circle cx="42" cy="42" r="19" stroke-width="1.4" opacity=".7"/>
        </g>
        <g stroke="var(--gold)" stroke-width="1.6">
          <line x1="42" y1="12" x2="42" y2="19"/><line x1="42" y1="65" x2="42" y2="72"/>
          <line x1="12" y1="42" x2="19" y2="42"/><line x1="65" y1="42" x2="72" y2="42"/>
          <line x1="20.8" y1="20.8" x2="25.7" y2="25.7"/><line x1="58.3" y1="58.3" x2="63.2" y2="63.2"/>
          <line x1="63.2" y1="20.8" x2="58.3" y2="25.7"/><line x1="25.7" y1="58.3" x2="20.8" y2="63.2"/>
        </g>
        <path d="M42 33 Q44 40 51 42 Q44 44 42 51 Q40 44 33 42 Q40 40 42 33 Z" fill="var(--gold)"/>
      </svg>
      <span class="card-title">Astrology</span>
      <span class="card-sub">Natal wheels, houses, the solar day</span>
    </a>
  </div>
  <div class="tools-row">
    <a class="tool-btn" href="calculator.html">Calculator</a>
    <a class="tool-btn" href="hexagrams.html">Hexagrams</a>
    <a class="tool-btn" href="quadrations.html">Quadrations</a>
  </div>
</main>

<footer class="site-footer"><div class="sf-inner"></div></footer>
</body>
</html>
