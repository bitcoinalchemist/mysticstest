<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dozenal Calculator (base 12)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="site.css" />
<style>
  :root {
    --bg:            #f7f2ea;
    --surface:       #fdfaf5;
    --surface-alt:   #f0e9da;
    --border:        #e2d9cc;
    --border-strong: #c9bfb0;
    --txt:           #1a1916;
    --muted:         #9a9690;
    --secondary:     #5a5750;
    --key:           #f0e9da;
    --key-hi:        #e6ddcc;
    --op:            #1e2340;
    --op-hi:         #2c335a;
    --accent:        #b5864a;
    --accent-hi:     #c99a5c;
    --gold-light:    #f5eddf;
    --eq:            #b5864a;
    --eq-hi:         #c99a5c;
    --danger:        #b53030;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans:  'Inter', system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html { height: 100%; }
  body {
    margin: 0; min-height: 100%;
    background: var(--bg);
    color: var(--txt);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    display: flex; flex-direction: column;
  }
  .calc-stage { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; padding: 2rem 1rem; }
  .sha { width: 420px; max-width: 96vw; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 18px; box-shadow: 0 4px 16px rgba(0,0,0,.06); }
  .sha-title { font-size: 11px; color: var(--accent); letter-spacing: .14em; text-transform: uppercase; font-weight: 600; margin-bottom: 12px; }
  .sha-row { display: flex; gap: 8px; }
  .sha-input { flex: 1; background: var(--surface-alt); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; font-family: monospace; font-size: 13px; color: var(--txt); outline: none; min-width: 0; }
  .sha-input:focus { border-color: var(--border-strong); }
  .sha-input::placeholder { color: var(--muted); }
  .sha-btn { background: var(--op); color: #fff; border: none; border-radius: 10px; padding: 10px 16px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background .12s; flex-shrink: 0; }
  .sha-btn:hover { background: var(--op-hi); }
  .sha-error { font-size: 11px; color: var(--danger); margin-top: 8px; min-height: 16px; }
  .sha-output { margin-top: 10px; background: var(--surface-alt); border: 1px solid var(--border); border-radius: 12px; padding: 12px; display: none; }
  .sha-out-row { display: flex; gap: 10px; margin-bottom: 7px; }
  .sha-out-row:last-child { margin-bottom: 0; }
  .sha-tag { font-size: 10px; font-weight: 700; letter-spacing: .06em; color: var(--muted); min-width: 26px; padding-top: 1px; flex-shrink: 0; }
  .sha-val { font-family: monospace; font-size: 11px; color: var(--txt); word-break: break-all; line-height: 1.6; }
  .sha-val.hex { color: var(--accent); }

  .calc {
    width: 420px; max-width: 96vw;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 18px;
    box-shadow: 0 16px 48px rgba(0,0,0,.12), 0 4px 16px rgba(0,0,0,.06);
  }
  .title { font-size: 11px; color: var(--accent); letter-spacing: .14em; text-transform: uppercase; font-weight: 600; margin: 2px 4px 14px; }
  .modebar { display: flex; gap: 6px; background: var(--surface-alt); border-radius: 12px; padding: 5px; margin-bottom: 14px; }
  .mode {
    flex: 1; padding: 9px 0; font-size: 14px; font-weight: 600;
    background: transparent; color: var(--secondary); border-radius: 8px;
  }
  .mode:hover { background: var(--key-hi); color: var(--txt); }
  .mode.active { background: var(--op); color: #fff; }
  .mode.active:hover { background: var(--op); }
  button:disabled { opacity: .35; cursor: default; }
  button:disabled:hover { background: var(--key); }
  .screen {
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 8px 14px 12px;
    margin-bottom: 16px;
    text-align: right;
    overflow: hidden;
  }
  .expr { min-height: 16px; font-size: 13px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .main { font-family: 'JetBrains Mono', 'Fira Mono', monospace; font-size: 44px; font-weight: 400; line-height: 1.15; word-break: break-all; }
  .main.error { color: var(--danger); font-size: 32px; }
  .conv-panel { background: var(--surface-alt); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; margin-top: 12px; }
  .conv { font-size: 12px; color: var(--accent); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .conv span { color: var(--muted); }
  .conv2 { margin-top: 3px; font-size: 12px; color: var(--accent); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .conv2 span { color: var(--muted); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  button {
    border: 1px solid var(--border); border-radius: 12px;
    padding: 16px 0; font-size: 20px; font-weight: 600;
    color: var(--txt); background: var(--key);
    cursor: pointer; transition: background .12s, transform .04s;
    -webkit-user-select: none; user-select: none;
  }
  button:hover { background: var(--key-hi); }
  button:active { transform: translateY(1px); }
  .op { background: var(--op); color: #fff; border-color: transparent; }
  .op:hover { background: var(--op-hi); }
  .op.active { background: var(--accent); color: #fff; }
  .fn { background: var(--surface-alt); color: var(--secondary); font-size: 17px; }
  .fn:hover { background: var(--key-hi); }
  .digit-ab { color: var(--accent); }
  .digit-hex { color: var(--accent); display: none; }
  .eq { grid-column: span 4; background: var(--eq); color: #fff; border-color: transparent; }
  .eq:hover { background: var(--eq-hi); }
  .hint { margin: 14px 4px 0; font-size: 11px; color: var(--muted); line-height: 1.5; }
</style>
</head>
<body>
<script src="site.js"></script>
  <main class="calc-stage">
  <div class="calc">
    <div class="modebar">
      <button class="mode" data-base="2">BIN</button>
      <button class="mode" data-base="10">DEC</button>
      <button class="mode active" data-base="12">DOZ</button>
      <button class="mode" data-base="16">HEX</button>
    </div>
    <div class="screen">
      <div class="expr" id="expr">&nbsp;</div>
      <div class="main" id="main">0</div>
    </div>
    <div class="grid">
      <button class="fn" data-act="clear">C</button>
      <button class="fn" data-act="back">⌫</button>
      <button class="fn" data-act="sign">±</button>
      <button class="op" data-op="div">÷</button>

      <button data-d="7">7</button>
      <button data-d="8">8</button>
      <button data-d="9">9</button>
      <button class="op" data-op="mul">×</button>

      <button data-d="4">4</button>
      <button data-d="5">5</button>
      <button data-d="6">6</button>
      <button class="op" data-op="sub">−</button>

      <button data-d="1">1</button>
      <button data-d="2">2</button>
      <button data-d="3">3</button>
      <button class="op" data-op="add">+</button>

      <button data-d="0">0</button>
      <button class="digit-ab" data-d="A">A</button>
      <button class="digit-ab" data-d="B">B</button>
      <button data-d=".">.</button>

      <button class="digit-hex" data-d="C">C</button>
      <button class="digit-hex" data-d="D">D</button>
      <button class="digit-hex" data-d="E">E</button>
      <button class="digit-hex" data-d="F">F</button>

      <button class="eq" data-act="equals">=</button>
    </div>
    <div class="conv-panel">
      <div class="conv" id="conv"></div>
      <div class="conv2" id="conv2"></div>
      <div class="conv2" id="conv3"></div>
    </div>
  </div>

  <div class="sha">
    <div class="sha-title">SHA-256</div>
    <div class="sha-row">
      <input class="sha-input" id="shaInput" type="text" placeholder="hex bytes — e.g. deadbeef" spellcheck="false" />
      <button class="sha-btn" id="shaBtn">Hash</button>
    </div>
    <div class="sha-error" id="shaErr"></div>
    <div class="sha-output" id="shaOutput">
      <div class="sha-out-row"><span class="sha-tag">HEX</span><span class="sha-val hex" id="shaHex"></span></div>
      <div class="sha-out-row"><span class="sha-tag">BIN</span><span class="sha-val" id="shaBin"></span></div>
    </div>
  </div>
  </main>

<script src="dozenal.js"></script>
<script>
(function () {
  "use strict";
  var D = window.Dozenal;
  var OPS = { add: D.add, sub: D.sub, mul: D.mul, div: D.div };
  var SYM = { add: "+", sub: "−", mul: "×", div: "÷" };

  var base = 12;
  var entry = "0";
  var acc = null;
  var pending = null;
  var waiting = false;
  var errored = false;

  var mainEl  = document.getElementById("main");
  var exprEl  = document.getElementById("expr");
  var convEl  = document.getElementById("conv");
  var conv2El = document.getElementById("conv2");
  var conv3El = document.getElementById("conv3");

  // Which digits are valid in each base
  var VALID = { 2: "01", 10: "0123456789", 12: "0123456789AB", 16: "0123456789ABCDEF" };
  // Conversion labels
  var LABELS = { 2: "bin", 10: "dec", 12: "doz", 16: "hex" };
  // For each base, the other 3 bases to show as conversions
  var CONV_BASES = { 2: [10, 12, 16], 10: [2, 12, 16], 12: [2, 10, 16], 16: [2, 10, 12] };

  function fmt(r, b) { return D.format(r, b || base); }

  function shownRat() {
    if (waiting && acc !== null) return acc;
    try { return D.parse(entry, base); } catch (e) { return null; }
  }

  function render() {
    if (errored) {
      mainEl.textContent = "Error";
      mainEl.classList.add("error");
      exprEl.innerHTML = "&nbsp;";
      convEl.innerHTML = "";
      conv2El.innerHTML = "";
      highlightOp();
      return;
    }
    mainEl.classList.remove("error");
    mainEl.textContent = (waiting && acc !== null) ? fmt(acc) : entry;

    if (acc !== null && pending !== null) {
      exprEl.textContent = fmt(acc) + " " + SYM[pending];
    } else {
      exprEl.innerHTML = "&nbsp;";
    }

    var r = shownRat();
    var cb = CONV_BASES[base];
    if (r) {
      try {
        convEl.innerHTML  = '<span>= </span>' + fmt(r, cb[0]) + ' <span>(' + LABELS[cb[0]] + ')</span>';
        conv2El.innerHTML = '<span>= </span>' + fmt(r, cb[1]) + ' <span>(' + LABELS[cb[1]] + ')</span>';
        conv3El.innerHTML = '<span>= </span>' + fmt(r, cb[2]) + ' <span>(' + LABELS[cb[2]] + ')</span>';
      } catch(e) {
        convEl.innerHTML = conv2El.innerHTML = conv3El.innerHTML = "";
      }
    } else {
      convEl.innerHTML = conv2El.innerHTML = conv3El.innerHTML = "";
    }
    highlightOp();
  }

  function highlightOp() {
    document.querySelectorAll(".op").forEach(function (b) {
      b.classList.toggle("active", !errored && pending && b.getAttribute("data-op") === pending && waiting);
    });
  }

  function clearAll() {
    entry = "0"; acc = null; pending = null; waiting = false; errored = false; render();
  }

  function digit(d) {
    if (VALID[base].indexOf(d.toUpperCase()) < 0) return;
    if (errored) clearAll();
    if (waiting) {
      entry = (d === ".") ? "0." : d;
      waiting = false;
      if (pending === null) acc = null;
    } else if (d === ".") {
      if (entry.indexOf(".") < 0) entry += ".";
    } else if (entry === "0") {
      entry = d.toUpperCase();
    } else if (entry.replace('-', '').length < 36) {
      entry += d.toUpperCase();
    }
    render();
  }

  function op(o) {
    if (errored) return;
    try {
      if (!waiting) {
        acc = (pending === null) ? D.parse(entry, base)
                                 : OPS[pending](acc, D.parse(entry, base));
      }
      pending = o;
      waiting = true;
      render();
    } catch (e) { errored = true; render(); }
  }

  function equals() {
    if (errored || pending === null) return;
    try {
      var operand = waiting ? acc : D.parse(entry, base);
      acc = OPS[pending](acc, operand);
      pending = null;
      waiting = true;
      render();
    } catch (e) { errored = true; render(); }
  }

  function updateButtons() {
    var valid = VALID[base];
    // digits 0-9
    document.querySelectorAll("[data-d]").forEach(function (btn) {
      var d = btn.dataset.d;
      if (d === ".") { btn.disabled = false; return; }
      btn.disabled = valid.indexOf(d.toUpperCase()) < 0;
    });
    // show/hide C-F hex row
    document.querySelectorAll(".digit-hex").forEach(function (btn) {
      btn.style.display = base === 16 ? "block" : "none";
    });
    // disable A-B when not valid (keep visible so layout stays fixed)
    document.querySelectorAll(".digit-ab").forEach(function (btn) {
      btn.disabled = (base === 2 || base === 10);
    });
    // mode tabs
    document.querySelectorAll(".mode").forEach(function (m) {
      m.classList.toggle("active", +m.getAttribute("data-base") === base);
    });
  }

  function setBase(b) {
    if (b === base) return;
    var r = errored ? null : shownRat();
    base = b;
    pending = null;
    errored = false;
    if (r !== null) {
      var s = D.format(r, b);
      if (s.indexOf('(') < 0) {
        // Exact representation in new base — keep as editable entry
        entry = s;
        acc = null;
        waiting = false;
      } else {
        // Repeating decimal — show as display value, fresh typing replaces it
        acc = r;
        entry = "0";
        waiting = true;
      }
    } else {
      entry = "0";
      acc = null;
      waiting = false;
    }
    updateButtons();
    render();
  }

  function sign() {
    if (errored) return;
    if (waiting && acc !== null) {
      acc = D.negate(acc);
    } else if (entry !== "0") {
      entry = entry[0] === "-" ? entry.slice(1) : "-" + entry;
    }
    render();
  }

  function back() {
    if (errored || waiting) return;
    if (entry.length <= 1 || (entry.length === 2 && entry[0] === "-")) entry = "0";
    else entry = entry.slice(0, -1);
    render();
  }

  // ---- wire up buttons ----
  document.querySelector(".grid").addEventListener("click", function (e) {
    var b = e.target.closest("button");
    if (!b) return;
    if (b.dataset.d != null) digit(b.dataset.d);
    else if (b.dataset.op) op(b.dataset.op);
    else if (b.dataset.act === "equals") equals();
    else if (b.dataset.act === "clear") clearAll();
    else if (b.dataset.act === "back") back();
    else if (b.dataset.act === "sign") sign();
  });

  document.querySelector(".modebar").addEventListener("click", function (e) {
    var b = e.target.closest(".mode");
    if (b) setBase(+b.getAttribute("data-base"));
  });

  updateButtons();
  render();

  // ---- keyboard ----
  document.addEventListener("keydown", function (e) {
    var k = e.key;
    if (/^[0-9]$/.test(k)) digit(k);
    else if (k === "a" || k === "A") digit("A");
    else if (k === "b" || k === "B") digit("B");
    else if (k === "c" || k === "C") digit("C");
    else if (k === "d" || k === "D") digit("D");
    else if (k === "e" || k === "E") digit("E");
    else if (k === "f" || k === "F") digit("F");
    else if (k === ".") digit(".");
    else if (k === "+") op("add");
    else if (k === "-") op("sub");
    else if (k === "*") op("mul");
    else if (k === "/") { e.preventDefault(); op("div"); }
    else if (k === "Enter" || k === "=") { e.preventDefault(); equals(); }
    else if (k === "Backspace") { e.preventDefault(); back(); }
    else if (k === "Escape") clearAll();
    else return;
  });

  render();
})();
</script>
<script>
(function () {
  var input  = document.getElementById('shaInput');
  var btn    = document.getElementById('shaBtn');
  var errEl  = document.getElementById('shaErr');
  var output = document.getElementById('shaOutput');
  var D      = window.Dozenal;

  async function doHash() {
    errEl.textContent = '';
    var raw = input.value.replace(/[\s:_-]/g, '');
    if (!raw) { errEl.textContent = 'Enter hex bytes'; output.style.display = 'none'; return; }
    if (raw.length % 2 !== 0 || /[^0-9a-fA-F]/.test(raw)) {
      errEl.textContent = 'Invalid hex — even number of hex digits only';
      output.style.display = 'none'; return;
    }

    var bytes = new Uint8Array(raw.length / 2);
    for (var i = 0; i < raw.length; i += 2)
      bytes[i / 2] = parseInt(raw.slice(i, i + 2), 16);

    var hashBuf   = await crypto.subtle.digest('SHA-256', bytes);
    var hashBytes = Array.from(new Uint8Array(hashBuf));

    // Standard hex — 8-char groups
    var hex = hashBytes.map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
    document.getElementById('shaHex').textContent = hex.match(/.{8}/g).join(' ');

    // Binary — first 4 bits only (first nibble of first byte)
    document.getElementById('shaBin').textContent =
      (hashBytes[0] >> 4).toString(2).padStart(4, '0');

    output.style.display = 'block';
  }

  btn.addEventListener('click', doHash);
  input.addEventListener('keydown', function(e){ if (e.key === 'Enter') doHash(); });
})();
</script>
<footer class="site-footer"><div class="sf-inner"></div></footer>
</body>
</html>
